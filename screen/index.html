<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>班级荣誉大屏</title>
  <link rel="stylesheet" href="css/screen.css">
</head>
<body>
  <div id="screen">
    <!-- 顶部标题栏 -->
    <header class="top-bar">
      <div class="logo">🏆</div>
      <div class="title-wrap">
        <h1>班级荣誉大屏</h1>
        <div class="subtitle">Class Honor Real-time Dashboard</div>
      </div>
      <div class="info-right">
        <div id="className" class="class-name">三年级二班</div>
        <div id="clock" class="clock">2024-01-01 00:00:00</div>
      </div>
    </header>

    <!-- 主体：三列布局 -->
    <main class="main-grid">
      <!-- 左列：排行榜 -->
      <section class="panel panel-ranking">
        <div class="panel-title">
          <span class="line"></span>
          <h2>🏅 班级排行榜</h2>
          <span class="line"></span>
        </div>
        <div id="rankingList" class="ranking-list"></div>
      </section>

      <!-- 中列：荣誉动态 + 公告 -->
      <section class="panel panel-center">
        <div class="panel-title">
          <span class="line"></span>
          <h2>🎉 荣誉动态</h2>
          <span class="line"></span>
        </div>
        <div id="honorTimeline" class="honor-timeline"></div>

        <div class="panel-title" style="margin-top: 40px;">
          <span class="line"></span>
          <h2>📢 班级公告</h2>
          <span class="line"></span>
        </div>
        <div id="announcementBox" class="announcement-box">
          <div class="announcement-content">
            <h3 id="annoTitle">欢迎使用班级荣誉皮肤系统</h3>
            <p id="annoContent">通过奖励积分和皮肤激励同学们好好学习、积极参与课堂活动。每位同学的努力都会被看见！</p>
            <div class="anno-meta"><span id="annoAuthor">班主任</span> · <span id="annoTime">今日</span></div>
          </div>
        </div>
      </section>

      <!-- 右列：皮肤墙 + 盲盒动态 -->
      <section class="panel panel-right">
        <div class="panel-title">
          <span class="line"></span>
          <h2>🎨 班级皮肤墙</h2>
          <span class="line"></span>
        </div>
        <div id="skinWall" class="skin-wall"></div>

        <div class="panel-title" style="margin-top: 40px;">
          <span class="line"></span>
          <h2>🎁 盲盒抽取动态</h2>
          <span class="line"></span>
        </div>
        <div id="blindboxList" class="blindbox-list"></div>
      </section>
    </main>

    <!-- 底部状态栏 -->
    <footer class="bottom-bar">
      <div class="stat-item">
        <div class="stat-value" id="totalStudents">0</div>
        <div class="stat-label">学生数</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="totalPoints">0</div>
        <div class="stat-label">总积分</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="totalSkins">0</div>
        <div class="stat-label">皮肤数</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="totalTitles">0</div>
        <div class="stat-label">称号数</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="totalDraws">0</div>
        <div class="stat-label">盲盒抽取</div>
      </div>
      <div class="status-indicator">
        <span class="status-dot"></span>
        <span id="socketStatus">实时连接中</span>
      </div>
    </footer>
  </div>

  <!-- Toast 事件弹窗 -->
  <div id="toast" class="toast hidden">
    <div class="toast-icon">🎖️</div>
    <div class="toast-content">
      <div class="toast-title" id="toastTitle"></div>
      <div class="toast-desc" id="toastDesc"></div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>if (typeof io === 'undefined') { document.write('<script src="js/socket.io.min.js"><\/script>'); }</script>
  <script src="js/socket.js"></script>
  <script src="js/ranking.js"></script>
  <script src="js/dynamics.js"></script>
  <script src="js/animation.js"></script>
</body>
</html>
